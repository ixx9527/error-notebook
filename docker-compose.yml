version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: error_notebook
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/error_notebook
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
      - SERVERCHAN_DEFAULT_KEY=${SERVERCHAN_DEFAULT_KEY:-}
      - WECOM_BOT_WEBHOOK=${WECOM_BOT_WEBHOOK:-}
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  pgdata:
